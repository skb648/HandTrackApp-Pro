name: airtouch_ultimate
description: AirTouch Ultimate - Advanced Hand Gesture Controller with AI-powered tracking
publish_to: 'none'
version: 5.1.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera & ML
  camera: ^0.10.5
  google_mlkit_pose_detection: ^0.11.0
  
  # Permissions
  permission_handler: ^11.0.0
  
  # UI
  cupertino_icons: ^1.0.6
  
  # Utilities
  shared_preferences: ^2.2.2
  vibration: ^1.8.4
  wakelock_plus: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icon/
